name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-frontend-protocol:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: git diff --check
      - run: npm ci
      - name: Source hygiene, manifests, versions, and protocol constants
        run: node scripts/source-hygiene.mjs
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: TypeScript check (JavaScript sources)
        run: npm run typecheck
      - name: Frontend tests
        run: npm test
      - name: Core protocol schema validation
        run: node core-protocol/schema-validate.mjs
      - name: Real MathJax golden fixtures
        run: npm run fixtures:mathjax:check

  rust:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Linux Tauri build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  native-office:
    uses: ./.github/workflows/native-office-ci.yml
    permissions:
      contents: read

  package-verify:
    uses: ./.github/workflows/package-verify.yml
    permissions:
      contents: read
