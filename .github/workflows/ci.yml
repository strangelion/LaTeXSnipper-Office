name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-package-impact:
    runs-on: ubuntu-24.04
    outputs:
      windows_package: ${{ steps.detect.outputs.windows_package }}
      linux_package: ${{ steps.detect.outputs.linux_package }}
      macos_package: ${{ steps.detect.outputs.macos_package }}
      any_package: ${{ steps.detect.outputs.any_package }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Detect package impact
        id: detect
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: node scripts/detect-package-impact.mjs --base "$BASE_SHA" --head "$HEAD_SHA"

  source-frontend-protocol:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: git diff --check
      - run: npm ci
      - name: Source hygiene, manifests, versions, and protocol constants
        run: node scripts/source-hygiene.mjs
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: TypeScript check (JavaScript sources)
        run: npm run typecheck
      - name: Frontend tests
        run: npm test
      - name: Core protocol schema validation
        run: node core-protocol/schema-validate.mjs
      - name: Install Office.js dependencies
        run: npm --prefix apps/office-addin ci
      - name: Build Office.js add-in
        run: npm --prefix apps/office-addin run build
      - name: Office.js academic layout and lifecycle tests
        run: node --test tests/officejs-academic-layout.test.mjs
      - name: Real MathJax golden fixtures
        run: npm run fixtures:mathjax:check
      - name: Browser extension dependencies
        run: npm --prefix apps/browser-extension ci
      - name: Browser extension typecheck and fixtures
        run: |
          npm --prefix apps/browser-extension run typecheck
          npm --prefix apps/browser-extension test
      - name: Build and verify Chrome and Firefox packages
        run: |
          npm --prefix apps/browser-extension run build
          node scripts/verify-browser-packages.mjs
      - name: Verify ecosystem staged artifact freshness
        run: |
          npm run build:ecosystem
          npm run stage:ecosystem
          npm run check:ecosystem-drift

  rust:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Linux Tauri build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package.json
      - run: npm ci
      - name: Build ecosystem resources for Tauri
        run: |
          npm run build:ecosystem
          npm run stage:ecosystem
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  native-office:
    uses: ./.github/workflows/native-office-ci.yml
    permissions:
      contents: read

  package-smoke:
    needs: detect-package-impact
    uses: ./.github/workflows/package-verify.yml
    with:
      run_windows: ${{ needs.detect-package-impact.outputs.windows_package == 'true' }}
      run_linux: ${{ needs.detect-package-impact.outputs.linux_package == 'true' }}
      run_macos: ${{ needs.detect-package-impact.outputs.macos_package == 'true' }}
      full_upgrade: true
    permissions:
      contents: read

  ci-gate:
    if: always()
    needs: [detect-package-impact, source-frontend-protocol, rust, native-office, package-smoke]
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce required CI results
        env:
          DETECT_RESULT: ${{ needs.detect-package-impact.result }}
          SOURCE_RESULT: ${{ needs.source-frontend-protocol.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          NATIVE_RESULT: ${{ needs.native-office.result }}
          PACKAGE_RESULT: ${{ needs.package-smoke.result }}
        run: |
          failed=0
          for pair in \
            "detect-package-impact=$DETECT_RESULT" \
            "source-frontend-protocol=$SOURCE_RESULT" \
            "rust=$RUST_RESULT" \
            "native-office=$NATIVE_RESULT" \
            "package-smoke=$PACKAGE_RESULT"; do
            echo "$pair"
            result="${pair#*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              failed=1
            fi
          done
          if [[ "$failed" -ne 0 ]]; then
            echo "One or more required CI dependencies failed or were cancelled."
            exit 1
          fi
