name: Build & Package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: '版本号递增（如当前 0.1.0 → patch=0.1.1 / minor=0.2.0 / major=1.0.0）'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      bump_override:
        description: '直接指定版本号（留空则按上方递增，如 1.2.3）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          CONF="src-tauri/tauri.conf.json"
          CARGO="src-tauri/Cargo.toml"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ inputs.bump }}"
            OVERRIDE="${{ inputs.bump_override }}"
            OLD=$(grep '"version"' $CONF | head -1 | sed 's/.*"\(.*\)".*/\1/')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
            if [ -n "$OVERRIDE" ]; then
              NEW="$OVERRIDE"
            elif [ "$BUMP" = "major" ]; then
              NEW="$((MAJOR+1)).0.0"
            elif [ "$BUMP" = "minor" ]; then
              NEW="$MAJOR.$((MINOR+1)).0"
            else
              NEW="$MAJOR.$MINOR.$((PATCH+1))"
            fi
            perl -pi -e "s/\"version\": \"$OLD\"/\"version\": \"$NEW\"/" $CONF
            perl -pi -e "s/^version = .*/version = \"$NEW\"/" $CARGO
            echo "Bumped $OLD -> $NEW"
          else
            NEW=$(grep '"version"' $CONF | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Version: $NEW"

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "release: v${{ steps.version.outputs.version }}"
          git push

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - name: Verify submodule
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --force --recursive
          if (-not (Test-Path 'src-tauri/latexsnipper-core/Cargo.toml')) {
            throw "Submodule not populated"
          }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }
      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - name: Verify submodule
        run: |
          git submodule sync --recursive
          git submodule update --init --force --recursive
          test -f src-tauri/latexsnipper-core/Cargo.toml

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }
      - run: npx tauri build --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - name: Verify submodule
        run: |
          git submodule sync --recursive
          git submodule update --init --force --recursive
          test -f src-tauri/latexsnipper-core/Cargo.toml

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }
      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  release:
    needs: [prepare, build-windows, build-macos, build-linux]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: List artifacts
        run: find artifacts -type f | head -30

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## LaTeXSnipper Office v${{ env.VERSION }}

            ### 下载
            - **Windows**: MSI / NSIS 安装包（包含 Word 插件自动注册）
            - **macOS**: DMG 安装包（Apple Silicon，Word 插件暂不支持）
            - **Linux**: DEB / RPM（Word 插件暂不支持）

            ### Word 插件
            仅 Windows 版本包含 Word COM 加载项。首次运行会自动注册。
            macOS / Linux 用户可使用 LaTeXSnipper 编辑器，手动复制公式到 Word。
