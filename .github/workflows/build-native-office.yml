name: Build Native Office VSTO

on:
  push:
    tags:
      - 'native-office-v*'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (Release/Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build-vsto:
    # Keep VSTO builds on the stable VS 2022 hosted image.
    runs-on: windows-2022
    env:
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      SOLUTION_DIR: apps/native-office

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Import release certificate from Secrets
        env:
          VSTO_CERT_BASE64: ${{ secrets.VSTO_CERT_BASE64 }}
          VSTO_CERT_PASSWORD: ${{ secrets.VSTO_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VSTO_CERT_BASE64)) {
            if ($env:GITHUB_REF -like "refs/tags/native-office-v*") {
              throw "VSTO_CERT_BASE64 is required for tagged Native Office releases"
            }
            Write-Host "  No VSTO_CERT_BASE64 secret — non-release build will use a dev certificate" -ForegroundColor Yellow
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:VSTO_CERT_PASSWORD)) {
            throw "VSTO_CERT_PASSWORD is required when VSTO_CERT_BASE64 is provided"
          }

          $certPath = Join-Path $env:RUNNER_TEMP "LaTeXSnipper-Office-Release.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:VSTO_CERT_BASE64))
          $securePassword = ConvertTo-SecureString $env:VSTO_CERT_PASSWORD -AsPlainText -Force
          $cert = Get-PfxCertificate -FilePath $certPath -Password $securePassword
          if ($null -eq $cert) {
            throw "Unable to load the VSTO release certificate"
          }

          "VstoManifestKeyFile=$certPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "VstoManifestKeyPassword=$env:VSTO_CERT_PASSWORD" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "VstoManifestThumbprint=$($cert.Thumbprint)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "  Release signing certificate loaded: $($cert.Thumbprint)" -ForegroundColor Green

      - name: Install VSTO runtime for manifest generation
        run: .\scripts\ensure-vsto-runtime.ps1

      - name: Install WiX Toolset
        run: |
          dotnet tool install wix --tool-path .wix --version 7.0.0
          (Resolve-Path .wix).Path | Out-File $env:GITHUB_PATH -Append -Encoding utf8

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION_DIR\LaTeXSnipper.NativeOffice.sln

      - name: Build and validate VSTO installers
        run: |
          & .\apps\native-office\Installer\build.ps1 `
            -Configuration $env:CONFIGURATION `
            -OutputDir .\apps\native-office\Installer\output

      - name: Remove ephemeral PFX
        if: always()
        run: |
          if ($env:VstoManifestKeyFile -and (Test-Path -LiteralPath $env:VstoManifestKeyFile)) {
            Remove-Item -LiteralPath $env:VstoManifestKeyFile -Force -ErrorAction SilentlyContinue
          }

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: native-office-${{ env.CONFIGURATION }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            apps/native-office/Installer/output/staging/**
            apps/native-office/Installer/output/*.msi
            apps/native-office/Installer/output/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/native-office-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            apps/native-office/Installer/output/*.msi
            apps/native-office/Installer/output/*.exe
            apps/native-office/Installer/output/staging/**/*
          generate_release_notes: true
          body: |
            ## LaTeXSnipper Native Office VSTO ${{ github.ref_name }}

            VSTO DLL 包（.vsto / .dll.manifest / .dll）。

            ### 使用方式
            1. 下载到本地
            2. 打开 LaTeXSnipper 桌面端 → 设置 → 开启 Office 集成
            3. 桌面端自动注册 COM 加载项，重启 Office 生效
