name: Build Native Office VSTO

on:
  push:
    tags:
      - 'native-office-v*'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (Release/Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build-vsto:
    runs-on: windows-latest
    env:
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      SOLUTION_DIR: apps/native-office

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION_DIR\LaTeXSnipper.NativeOffice.sln

      - name: Build VSTO solution
        run: |
          & "C:\Program Files\Microsoft Visual Studio\18\Enterprise\MSBuild\Current\Bin\MSBuild.exe" `
            "$env:SOLUTION_DIR\LaTeXSnipper.NativeOffice.sln" `
            /t:Build `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform="Any CPU" `
            /p:SignManifests=false `
            /p:VSToolsPath="" `
            /v:minimal

      - name: Stage build output
        shell: pwsh
        run: |
          $out = "$env:SOLUTION_DIR\Installer\output"
          $staging = "$out\staging"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          foreach ($h in @("Word","Excel","PowerPoint")) {
            $src = "$env:SOLUTION_DIR\LaTeXSnipper.$h\bin\$env:CONFIGURATION"
            $dst = "$staging\$h"
            if (Test-Path $src) { Copy-Item "$src\*" $dst -Recurse -Force }
          }
          $sharedSrc = "$env:SOLUTION_DIR\LaTeXSnipper.Shared\bin\$env:CONFIGURATION"
          $sharedDst = "$staging\Shared"
          if (Test-Path $sharedSrc) { Copy-Item "$sharedSrc\*" $sharedDst -Recurse -Force }

          Get-ChildItem $staging -Recurse -File | ForEach-Object {
            Write-Host "  $($_.FullName.Replace($staging, ''))" -ForegroundColor Gray
          }

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: native-office-${{ env.CONFIGURATION }}-${{ github.sha }}
          path: apps/native-office/Installer/output/staging/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/native-office-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: apps/native-office/Installer/output/staging/**/*
          generate_release_notes: true
          body: |
            ## LaTeXSnipper Native Office VSTO ${{ github.ref_name }}

            VSTO DLL 包（.vsto / .dll.manifest / .dll）。

            ### 使用方式
            1. 下载到本地
            2. 打开 LaTeXSnipper 桌面端 → 设置 → 开启 Office 集成
            3. 桌面端自动注册 COM 加载项，重启 Office 生效
