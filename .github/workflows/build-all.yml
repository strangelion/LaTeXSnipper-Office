name: Build All (Unified Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.0.0)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

env:
  # Resolve version: tag name -> semver, or input, or default
  VERSION: ${{ github.event.inputs.version || '' }}

jobs:
  # ─────────── Resolve version ──────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ env.VERSION }}" ]; then
            VER="${{ env.VERSION }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            VER="3.0.0"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Validate protocol schema
        shell: bash
        run: node core-protocol/schema-validate.mjs

  # ─────────── Office Web Add-in ────────────────────────────────────
  office-addin:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/office-addin/package-lock.json

      - name: Install deps
        working-directory: apps/office-addin
        run: npm ci

      - name: Inject version into Office manifests
        shell: bash
        run: |
          ver="${{ needs.prepare.outputs.version }}"
          ver4="${ver}.0"
          for f in apps/office-addin/manifests/*.xml; do
            if [ -f "$f" ]; then
              perl -pi -e "s|<Version>.*</Version>|<Version>${ver4}</Version>|" "$f"
            fi
          done
          echo "Office manifests version set to ${ver4}"

      - name: Validate Office manifests
        working-directory: apps/office-addin
        run: |
          npm run validate:word
          npm run validate:excel
          npm run validate:powerpoint

      - name: Build
        working-directory: apps/office-addin
        run: npm run build

      - name: Stage Office assets for Tauri bundle
        run: node scripts/stage-office-addin.mjs

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: office-addin
          path: |
            apps/office-addin/dist/
            src-tauri/resources/OfficeJS/

  # ─────────── Tauri Desktop (Windows) ───────────
  tauri-windows:
    needs: [prepare, office-addin]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - uses: actions/download-artifact@v4
        with: { name: office-addin }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Install Office add-in dependencies
        working-directory: apps/office-addin
        run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }

      # Inject version into Cargo.toml and tauri.conf.json
      - name: Inject version
        shell: bash
        run: |
          perl -pi -e 's/"version": ".*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          perl -pi -e 's/^version = .*/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          echo "Injected version $VERSION into manifests"

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ─────────── Tauri Desktop (macOS) ───────────
  tauri-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Install Office add-in dependencies
        working-directory: apps/office-addin
        run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }

      - name: Inject version
        shell: bash
        run: |
          perl -pi -e 's/"version": ".*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          perl -pi -e 's/^version = .*/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          echo "Injected version $VERSION into manifests"

      # Ensure DirectML.dll is present for Windows builds only
      - name: Setup DirectML (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/resources/DirectML.dll")) {
            # Download DirectML.dll if not in repo (should be in repo for Windows builds)
            Write-Warning "DirectML.dll not found in resources"
          }

      - run: npx tauri build --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ─────────── Tauri Desktop (Linux) ───────────
  tauri-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Install Office add-in dependencies
        working-directory: apps/office-addin
        run: npm ci
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }

      - name: Inject version
        shell: bash
        run: |
          perl -pi -e 's/"version": ".*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          perl -pi -e 's/^version = .*/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          echo "Injected version $VERSION into manifests"

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  # ─────────── VSTO Native Office ───────────
  vsto:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2

      - name: Restore NuGet
        run: nuget restore apps\native-office\LaTeXSnipper.NativeOffice.sln

      - name: Setup WiX v4
        run: dotnet tool install --global wix

      - name: Build solution and installer
        working-directory: apps/native-office/Installer
        run: .\build.ps1 -Configuration Release -OutputDir output -Version $env:VERSION -SkipSigning

      - name: Sign artifacts
        if: env.CERT_THUMBPRINT != ''
        working-directory: apps/native-office/Installer
        run: .\sign.ps1 -CertThumbprint "$env:CERT_THUMBPRINT" -OutputDir output
        env:
          CERT_THUMBPRINT: ${{ secrets.VSTO_CERT_THUMBPRINT }}

      - name: Smoke test build outputs
        shell: pwsh
        run: |
          $out = "apps/native-office/Installer/output"
          $msi = Get-ChildItem "$out" -Filter "*.msi" | Select-Object -First 1
          $exe = Get-ChildItem "$out" -Filter "*.exe" | Select-Object -First 1

          if ($msi) {
            Write-Host "MSI found: $($msi.Name) ($([math]::Round($msi.Length/1MB,2)) MB)"
            # Verify MSI is a valid PE file (starts with MZ header)
            $bytes = [System.IO.File]::ReadAllBytes($msi.FullName)
            $header = [System.Text.Encoding]::ASCII.GetString($bytes, 0, 2)
            if ($header -eq "MZ") { Write-Host "  MSI header: valid PE" -ForegroundColor Green }
            else { Write-Warning "MSI may not be a valid installer" }
          } else {
            throw "MSI not found - build failed silently"
          }

          if ($exe) {
            Write-Host "Bootstrapper found: $($exe.Name) ($([math]::Round($exe.Length/1MB,2)) MB)"
            $bytes = [System.IO.File]::ReadAllBytes($exe.FullName)
            $header = [System.Text.Encoding]::ASCII.GetString($bytes, 0, 2)
            if ($header -eq "MZ") { Write-Host "  EXE header: valid PE" -ForegroundColor Green }
            else { Write-Warning "Bootstrapper may not be a valid installer" }
          } else {
            Write-Warning "Bootstrapper EXE not found"
          }

      - uses: actions/upload-artifact@v4

  # ─────────── WPS Plugin ───────────
  wps:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Build WPS plugin
        working-directory: apps/wps
        run: .\build.ps1 -Version $env:VERSION -OutputDir dist

      - uses: actions/upload-artifact@v4
        with:
          name: wps
          path: apps/wps/dist/latexsnipper-wps_${{ env.VERSION }}.zip

  # ─────────── Obsidian Plugin ───────────
  obsidian:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/obsidian-plugin/package-lock.json

      - name: Set version in manifest
        working-directory: apps/obsidian-plugin
        shell: bash
        run: |
          perl -pi -e 's/"version": ".*"/"version": "'"$VERSION"'"/' manifest.json
          echo "Obsidian manifest version set to $VERSION"

      - name: Install deps
        working-directory: apps/obsidian-plugin
        run: npm ci

      - name: Build
        working-directory: apps/obsidian-plugin
        run: npm run build -- --production

      - name: Package
        working-directory: apps/obsidian-plugin
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $d = "dist/latexsnipper-obsidian_$env:VERSION"
          New-Item -ItemType Directory -Path $d -Force | Out-Null
          Copy-Item main.js $d/
          Copy-Item manifest.json $d/
          Compress-Archive -Path "$d\*" -DestinationPath "dist/latexsnipper-obsidian_$env:VERSION.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: obsidian
          path: apps/obsidian-plugin/dist/*.zip

  # ─────────── Package + Release ───────────
  package:
    needs: [prepare, tauri-windows, tauri-macos, tauri-linux, vsto, wps, obsidian]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: Organize release artifacts
        run: |
          $ver = "$env:VERSION"
          $release = "release/LaTeXSnipper-$ver"
          New-Item -ItemType Directory -Path $release -Force | Out-Null

          # Tauri Windows
          $tw = Get-ChildItem "artifacts/tauri-windows" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/windows" -Force
          $tw | Copy-Item -Destination "$release/windows/" -Force

          # VSTO
          $vsto = Get-ChildItem "artifacts/vsto" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/windows/vsto" -Force
          $vsto | Copy-Item -Destination "$release/windows/vsto/" -Force

          # WPS
          $null = New-Item -ItemType Directory -Path "$release/plugins" -Force
          Copy-Item "artifacts/wps/*.zip" "$release/plugins/" -Force

          # Obsidian
          Copy-Item "artifacts/obsidian/*.zip" "$release/plugins/" -Force

          # macOS
          $mac = Get-ChildItem "artifacts/tauri-macos" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/macos" -Force
          $mac | Copy-Item -Destination "$release/macos/" -Force

          # Linux
          $linux = Get-ChildItem "artifacts/tauri-linux" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/linux" -Force
          $linux | Copy-Item -Destination "$release/linux/" -Force

          # Build release-manifest.json
          $manifest = @{ version = $ver; components = @() }
          Get-ChildItem $release -Recurse -File | ForEach-Object {
            $manifest.components += @{
              path = $_.FullName.Replace((Get-Location).Path + "\release\", "")
              size = $_.Length
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Out-File (Join-Path $release "release-manifest.json") -Encoding UTF8

          Write-Host "Release structure:"
          Get-ChildItem $release -Recurse -File | ForEach-Object {
            Write-Host "  $($_.FullName.Replace((Get-Location).Path, '')) ($(($_.Length/1MB).ToString('F2')) MB)"
          }

      - name: Install NSIS
        shell: bash
        run: choco install nsis -y

      - name: Build combined NSIS installer
        run: |
          $ver = "$env:VERSION"
          $nsi = "installer/LaTeXSnipper.AllInOne.nsi"
          $release = Resolve-Path "release/LaTeXSnipper-$ver"

          $tauriExe = Get-ChildItem "$release/windows" -Filter "*.exe" | Select-Object -First 1

          if ($tauriExe) {
            # Build NSIS with absolute paths via /D defines
            $nsisArgs = @(
              "/DPRODUCT_VERSION=$ver"
              "/DTAURI_INSTALLER=$($tauriExe.FullName)"
            )

            $vstoBundle = Get-ChildItem "$release/windows/vsto" -Filter "*.exe" | Select-Object -First 1
            if ($vstoBundle) {
              $nsisArgs += "/DVSTO_INSTALLER=$($vstoBundle.FullName)"
            }

            $wpsZip = Get-ChildItem "$release/plugins" -Filter "latexsnipper-wps_*.zip" | Select-Object -First 1
            if ($wpsZip) {
              $nsisArgs += "/DWPS_ZIP=$($wpsZip.FullName)"
            }

            $obsidianZip = Get-ChildItem "$release/plugins" -Filter "latexsnipper-obsidian_*.zip" | Select-Object -First 1
            if ($obsidianZip) {
              $nsisArgs += "/DOBSIDIAN_ZIP=$($obsidianZip.FullName)"
            }

            $nsisArgs += $nsi

            Write-Host "Building NSIS with args: $($nsisArgs -join ' ')"
            & makensis @nsisArgs

            $outPath = Join-Path $release "LaTeXSnipper-Office-$ver-Setup.exe"
            if (Test-Path "LaTeXSnipper-Office-$ver-Setup.exe") {
              Move-Item "LaTeXSnipper-Office-$ver-Setup.exe" $outPath -Force
              Write-Host "Combined NSIS installer: $outPath"
            } else {
              Write-Warning "NSIS build did not produce expected output"
            }
          } else {
            Write-Warning "No Tauri desktop installer found, skipping NSIS"
          }

      - name: Upload unified release artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaTeXSnipper-${{ env.VERSION }}
          path: release/LaTeXSnipper-${{ env.VERSION }}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: |
            release/LaTeXSnipper-${{ env.VERSION }}/**/*
          generate_release_notes: true
          body: |
            ## LaTeXSnipper Office v${{ env.VERSION }}

            ### Windows
            - **Tauri Desktop**: `windows/LaTeXSnipper*.exe` (.msi)
            - **VSTO Add-in**: `windows/vsto/LaTeXSnipper.NativeOffice.exe`
            - **Combined Installer**: `LaTeXSnipper-Office-${{ env.VERSION }}-Setup.exe`
            - **WPS Plugin**: `plugins/latexsnipper-wps_${{ env.VERSION }}.zip`
            - **Obsidian Plugin**: `plugins/latexsnipper-obsidian_${{ env.VERSION }}.zip`

            ### macOS
            - **Tauri Desktop**: `macos/*.dmg`

            ### Linux
            - **Tauri Desktop**: `linux/*.deb` (.rpm)

            ### release-manifest.json
            Contains version, component list, and sizes for every release artifact.
