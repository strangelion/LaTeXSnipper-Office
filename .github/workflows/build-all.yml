name: Build All (Unified Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.0.0)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

env:
  # Resolve version: tag name → semver, or input, or default
  VERSION: ${{ github.event.inputs.version || '' }}

jobs:
  # ─────────── Resolve version ──────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ env.VERSION }}" ]; then
            VER="${{ env.VERSION }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            VER="3.0.0"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

  # ─────────── Office Web Add-in ────────────────────────────────────
  office-addin:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/office-addin/package-lock.json

      - name: Install deps
        working-directory: apps/office-addin
        run: npm ci

      - name: Build
        working-directory: apps/office-addin
        run: npm run build

      - name: Stage Office assets for Tauri bundle
        run: node scripts/stage-office-addin.mjs

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: office-addin
          path: |
            apps/office-addin/dist/
            src-tauri/resources/OfficeJS/

  # ─────────── Tauri Desktop (Windows) ───────────
  tauri-windows:
    needs: [prepare, office-addin]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with: { name: office-addin }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }

      # Inject version into Cargo.toml and tauri.conf.json
      - run: |
          $ver = "$env:VERSION"
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', "`"version`": `"$ver`"" | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml) -replace '^version = .*', "version = `"$ver`"" | Set-Content src-tauri/Cargo.toml

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ─────────── Tauri Desktop (macOS) ───────────
  tauri-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }

      - run: |
          $ver = "$env:VERSION"
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', "`"version`": `"$ver`"" | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml) -replace '^version = .*', "version = `"$ver`"" | Set-Content src-tauri/Cargo.toml

      - run: npx tauri build --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ─────────── Tauri Desktop (Linux) ───────────
  tauri-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }

      - run: |
          $ver = "$env:VERSION"
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', "`"version`": `"$ver`"" | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml) -replace '^version = .*', "version = `"$ver`"" | Set-Content src-tauri/Cargo.toml

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  # ─────────── VSTO Native Office ───────────
  vsto:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2

      - name: Restore NuGet
        run: nuget restore apps\native-office\LaTeXSnipper.NativeOffice.sln

      - name: Setup WiX v4
        run: dotnet tool install --global wix

      - name: Build solution
        run: |
          MSBuild.exe apps\native-office\LaTeXSnipper.NativeOffice.sln `
            /t:Build /p:Configuration=Release /p:Platform="Any CPU" /v:minimal

      - name: Build installer
        working-directory: apps/native-office/Installer
        run: .\build.ps1 -Configuration Release -OutputDir output

      - uses: actions/upload-artifact@v4
        with:
          name: vsto
          path: apps/native-office/Installer/output/*

  # ─────────── WPS Plugin ───────────
  wps:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Build WPS plugin
        working-directory: apps/wps
        run: .\build.ps1 -Version $env:VERSION -OutputDir dist

      - uses: actions/upload-artifact@v4
        with:
          name: wps
          path: apps/wps/dist/latexsnipper-wps_${{ env.VERSION }}.zip

  # ─────────── Obsidian Plugin ───────────
  obsidian:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/obsidian-plugin/package-lock.json

      - name: Set version in manifest
        working-directory: apps/obsidian-plugin
        run: (Get-Content manifest.json) -replace '"version": ".*"', "`"version`": `"$env:VERSION`"" | Set-Content manifest.json

      - name: Install deps
        working-directory: apps/obsidian-plugin
        run: npm ci

      - name: Build
        working-directory: apps/obsidian-plugin
        run: npm run build -- --production

      - name: Package
        working-directory: apps/obsidian-plugin
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $d = "dist/latexsnipper-obsidian_$env:VERSION"
          New-Item -ItemType Directory -Path $d -Force | Out-Null
          Copy-Item main.js $d/
          Copy-Item manifest.json $d/
          Compress-Archive -Path "$d\*" -DestinationPath "dist/latexsnipper-obsidian_$env:VERSION.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: obsidian
          path: apps/obsidian-plugin/dist/*.zip

  # ─────────── Package + Release ───────────
  package:
    needs: [prepare, tauri-windows, tauri-macos, tauri-linux, vsto, wps, obsidian]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: Organize release artifacts
        run: |
          $ver = "$env:VERSION"
          $release = "release/LaTeXSnipper-$ver"
          New-Item -ItemType Directory -Path $release -Force | Out-Null

          # Tauri Windows
          $tw = Get-ChildItem "artifacts/tauri-windows" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/windows" -Force
          $tw | Copy-Item -Destination "$release/windows/" -Force

          # VSTO
          $vsto = Get-ChildItem "artifacts/vsto" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/windows/vsto" -Force
          $vsto | Copy-Item -Destination "$release/windows/vsto/" -Force

          # WPS
          $null = New-Item -ItemType Directory -Path "$release/plugins" -Force
          Copy-Item "artifacts/wps/*.zip" "$release/plugins/" -Force

          # Obsidian
          Copy-Item "artifacts/obsidian/*.zip" "$release/plugins/" -Force

          # macOS
          $mac = Get-ChildItem "artifacts/tauri-macos" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/macos" -Force
          $mac | Copy-Item -Destination "$release/macos/" -Force

          # Linux
          $linux = Get-ChildItem "artifacts/tauri-linux" -Recurse -File
          $null = New-Item -ItemType Directory -Path "$release/linux" -Force
          $linux | Copy-Item -Destination "$release/linux/" -Force

          # Build release-manifest.json
          $manifest = @{ version = $ver; components = @() }
          Get-ChildItem $release -Recurse -File | ForEach-Object {
            $manifest.components += @{
              path = $_.FullName.Replace((Get-Location).Path + "\release\", "")
              size = $_.Length
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Out-File (Join-Path $release "release-manifest.json") -Encoding UTF8

          Write-Host "Release structure:"
          Get-ChildItem $release -Recurse -File | ForEach-Object {
            Write-Host "  $($_.FullName.Replace((Get-Location).Path, '')) ($(($_.Length/1MB).ToString('F2')) MB)"
          }

      - name: Build combined NSIS installer
        run: |
          $ver = "$env:VERSION"
          $nsi = "installer/LaTeXSnipper.AllInOne.nsi"
          $release = "release/LaTeXSnipper-$ver"
          $tauriExe = Get-ChildItem "$release/windows" -Filter "*.exe" | Select-Object -First 1

          if ($tauriExe) {
            # Copy assets needed by NSIS script into the release dir
            $nsisDir = "release/LaTeXSnipper-$ver/installer"
            New-Item -ItemType Directory -Path $nsisDir -Force | Out-Null

            # Stage files that the NSIS script references as relative paths
            Copy-Item $tauriExe.FullName "$nsisDir/" -Force
            $vstoBundle = Get-ChildItem "$release/windows/vsto" -Filter "*.exe" | Select-Object -First 1
            if ($vstoBundle) { Copy-Item $vstoBundle.FullName "$nsisDir/" -Force }

            # Update NSIS version
            (Get-Content $nsi) -replace '!define PRODUCT_VERSION ".*"', "!define PRODUCT_VERSION `"$ver`"" | Set-Content $nsi

            # Build NSIS if makensis is available
            $nsis = Get-Command "makensis" -ErrorAction SilentlyContinue
            if ($nsis) {
              $outPath = "release/LaTeXSnipper-$ver/LaTeXSnipper-Office-$ver-Setup.exe"
              & makensis /DTAURI_INSTALLER="$tauriExe" $nsi
              if (Test-Path "LaTeXSnipper-Office-$ver-Setup.exe") {
                Move-Item "LaTeXSnipper-Office-$ver-Setup.exe" $outPath -Force
                Write-Host "Combined NSIS installer: $outPath"
              }
            } else {
              Write-Host "makensis not available. Install NSIS to build combined installer."
            }
          }

      - name: Upload unified release artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaTeXSnipper-${{ env.VERSION }}
          path: release/LaTeXSnipper-${{ env.VERSION }}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: |
            release/LaTeXSnipper-${{ env.VERSION }}/**/*
          generate_release_notes: true
          body: |
            ## LaTeXSnipper Office v${{ env.VERSION }}

            ### Windows
            - **Tauri Desktop**: `windows/LaTeXSnipper*.exe` (.msi)
            - **VSTO Add-in**: `windows/vsto/LaTeXSnipper.NativeOffice.exe`
            - **Combined Installer**: `LaTeXSnipper-Office-${{ env.VERSION }}-Setup.exe`
            - **WPS Plugin**: `plugins/latexsnipper-wps_${{ env.VERSION }}.zip`
            - **Obsidian Plugin**: `plugins/latexsnipper-obsidian_${{ env.VERSION }}.zip`

            ### macOS
            - **Tauri Desktop**: `macos/*.dmg`

            ### Linux
            - **Tauri Desktop**: `linux/*.deb` (.rpm)

            ### release-manifest.json
            Contains version, component list, and sizes for every release artifact.
