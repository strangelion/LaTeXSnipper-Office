name: Build Obsidian Plugin

on:
  push:
    tags:
      - 'obsidian-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version (overrides manifest.json)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build-obsidian:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.version || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: resolve
        shell: bash
        run: |
          if [ -n "$VERSION" ]; then
            VER="$VERSION"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/obsidian-v(.+)$ ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            VER="3.0.0"
          fi
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "Version: $VER"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/obsidian-plugin/package-lock.json

      # Optional: override version in manifest.json
      - name: Set version
        if: github.event.inputs.version != ''
        working-directory: apps/obsidian-plugin
        shell: bash
        run: |
          ver="${{ github.event.inputs.version }}"
          sed -i 's/"version": ".*"/"version": "'"$ver"'"/' manifest.json
          echo "Version set to $ver"

      - name: Install dependencies
        working-directory: apps/obsidian-plugin
        run: npm ci

      - name: TypeScript check
        working-directory: apps/obsidian-plugin
        run: npx tsc --noEmit

      - name: Build plugin (esbuild)
        working-directory: apps/obsidian-plugin
        run: npm run build -- --production

      - name: Package plugin
        working-directory: apps/obsidian-plugin
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) {
            $ver = (Get-Content manifest.json | ConvertFrom-Json).version
          }
          $dist = "dist/latexsnipper-obsidian_$ver"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          Copy-Item main.js $dist/
          Copy-Item manifest.json $dist/
          if (Test-Path styles.css) { Copy-Item styles.css $dist/ }
          Compress-Archive -Path "$dist\*" -DestinationPath "dist/latexsnipper-obsidian_$ver.zip"
          Write-Host "Packaged: dist/latexsnipper-obsidian_$ver.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: apps/obsidian-plugin/dist/*.zip

      # Create GitHub Release on tag push
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/obsidian-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: apps/obsidian-plugin/dist/*.zip
          generate_release_notes: true
          body: |
            ## LaTeXSnipper Obsidian Plugin ${{ github.ref_name }}

            ### 下载
            - **`latexsnipper-obsidian_*.zip`** — 插件包

            ### 安装说明（手动）
            1. 解压到 Obsidian  vault 的 `.obsidian/plugins/latexsnipper-obsidian/`
            2. 在 Obsidian 设置 → 第三方插件 → 启用 LaTeXSnipper
            3. 使用命令面板（Ctrl+P）搜索 "Insert formula"

            ### 功能
            - 行内/块级 LaTeX 公式插入
            - 公式预览（实时渲染）
