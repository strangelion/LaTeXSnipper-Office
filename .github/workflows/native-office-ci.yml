name: Native Office CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-matrix:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [Win32, x64]
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify real MathJax tex-svg fixtures
        run: npm run fixtures:mathjax:check
      - uses: microsoft/setup-msbuild@v2
      - name: Build OLE handler (/W4)
        shell: pwsh
        run: >-
          msbuild apps\native-office\LaTeXSnipper.OleFormulaObjectNative\LaTeXSnipper.OfficePlugin.OleFormulaObjectHandler.vcxproj
          /m /t:Build /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}
          /p:WarningLevel=Level4 /p:TreatWarningAsError=true /v:minimal
      - name: Build NativeVectorTests (/W4)
        shell: pwsh
        run: >-
          msbuild apps\native-office\LaTeXSnipper.OleFormulaObjectNative.Tests\LaTeXSnipper.OleFormulaObjectNative.Tests.vcxproj
          /m /t:Build /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}
          /p:WarningLevel=Level4 /p:TreatWarningAsError=true /v:minimal
      - name: Build OleActivationProbe (/W4 /WX)
        shell: pwsh
        run: >-
          msbuild apps\native-office\OleActivationProbe\OleActivationProbe.vcxproj
          /m /t:Build /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:minimal
      - name: Run vector, golden fixture, storage corruption, and transport tests
        shell: pwsh
        run: |
          $suffix = if ('${{ matrix.platform }}' -eq 'Win32') { 'x86' } else { 'x64' }
          $test = "apps\native-office\LaTeXSnipper.OleFormulaObjectNative.Tests\bin\${{ matrix.platform }}\${{ matrix.configuration }}\NativeVectorTests.exe"
          $dll = "apps\native-office\LaTeXSnipper.OleFormulaObjectNative\bin\${{ matrix.platform }}\${{ matrix.configuration }}\LaTeXSnipper.OfficePlugin.OleFormulaObject.Handler.$suffix.dll"
          & $test $dll "apps\native-office\fixtures\mathjax-svg"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  managed-tests:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build Shared tests
        shell: pwsh
        run: >-
          msbuild apps\native-office\LaTeXSnipper.Shared.Tests\LaTeXSnipper.Shared.Tests.csproj
          /m /t:Build /p:Configuration=Release /p:Platform=AnyCPU /p:WarningLevel=4 /v:minimal
      - name: Run PendingPayload ACL/transport and strict Base64 tests
        shell: pwsh
        run: |
          & apps\native-office\LaTeXSnipper.Shared.Tests\bin\Release\LaTeXSnipper.Shared.Tests.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  vsto-build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: nuget/setup-nuget@v2
      - name: Ensure VSTO build runtime
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\ensure-vsto-runtime.ps1
      - name: Restore and build C# VSTO projects
        shell: pwsh
        run: |
          nuget restore apps\native-office\LaTeXSnipper.NativeOffice.sln
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          msbuild apps\native-office\LaTeXSnipper.NativeOffice.sln /m /t:Build /p:Configuration=Release "/p:Platform=Any CPU" /p:WarningLevel=4 /v:minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  com-activation:
    needs: [native-matrix, managed-tests, vsto-build]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build dual-bitness Release activation inputs
        shell: pwsh
        run: |
          $handler = 'apps\native-office\LaTeXSnipper.OleFormulaObjectNative\LaTeXSnipper.OfficePlugin.OleFormulaObjectHandler.vcxproj'
          $probe = 'apps\native-office\OleActivationProbe\OleActivationProbe.vcxproj'
          foreach ($platform in @('Win32', 'x64')) {
            msbuild $handler /m /t:Build /p:Configuration=Release /p:Platform=$platform /p:WarningLevel=Level4 /p:TreatWarningAsError=true /v:minimal
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            msbuild $probe /m /t:Build /p:Configuration=Release /p:Platform=$platform /v:minimal
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          New-Item -ItemType Directory -Force native-staging, vsto-diagnostics | Out-Null
          Copy-Item apps\native-office\LaTeXSnipper.OleFormulaObjectNative\bin\Win32\Release\LaTeXSnipper.OfficePlugin.OleFormulaObject.Handler.x86.dll native-staging\OleFormulaObject.x86.dll
          Copy-Item apps\native-office\LaTeXSnipper.OleFormulaObjectNative\bin\x64\Release\LaTeXSnipper.OfficePlugin.OleFormulaObject.Handler.x64.dll native-staging\OleFormulaObject.x64.dll
      - name: Native dual-bitness COM activation gate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          & powershell -NoProfile -ExecutionPolicy Bypass -File scripts\smoke-ole-activation.ps1 -StagingRoot native-staging -ProbeConfiguration Release *>&1 |
            Tee-Object -FilePath vsto-diagnostics\activation.log
          $code = $LASTEXITCODE
          reg.exe query HKCU\Software\Classes\CLSID\{B7F5B4AB-5F94-4D87-A29F-9A41D41B3B9F} /s /reg:64 *> vsto-diagnostics\registry-x64.txt
          reg.exe query HKCU\Software\Classes\CLSID\{B7F5B4AB-5F94-4D87-A29F-9A41D41B3B9F} /s /reg:32 *> vsto-diagnostics\registry-x86.txt
          Get-FileHash native-staging\*.dll -Algorithm SHA256 | Format-List | Out-File vsto-diagnostics\sha256.txt
          exit $code
      - name: Upload VSTO activation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vsto-diagnostics
          path: vsto-diagnostics/
          if-no-files-found: error
          retention-days: 14
