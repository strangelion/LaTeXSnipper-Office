name: Package Verify

on:
  workflow_call:
    inputs:
      source_ref:
        type: string
        default: ''

      expected_version:
        type: string
        default: ''

      prior_tag:
        type: string
        default: v1.2.1

      run_windows:
        type: boolean
        default: true

      run_linux:
        type: boolean
        default: true

      run_macos:
        type: boolean
        default: true

      full_upgrade:
        type: boolean
        default: true

      release_mode:
        type: boolean
        default: false

    secrets:
      VSTO_CERT_BASE64:
        required: false

      VSTO_CERT_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  windows-packages:
    if: inputs.run_windows
    runs-on: windows-2022
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
      - name: Verify package source version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          $cargoText = Get-Content src-tauri\Cargo.toml -Raw
          $cargoMatch = [regex]::Match(
            $cargoText,
            '(?m)^version\s*=\s*"([^"]+)"'
          )

          if (-not $cargoMatch.Success) {
            throw "Unable to read version from src-tauri/Cargo.toml"
          }

          $cargoVersion = $cargoMatch.Groups[1].Value
          $expected = '${{ inputs.expected_version }}'

          if ([string]::IsNullOrWhiteSpace($expected)) {
            $expected = $packageVersion
          }

          foreach ($entry in @{
            package = $packageVersion
            tauri = $tauriVersion
            cargo = $cargoVersion
          }.GetEnumerator()) {
            if ($entry.Value -ne $expected) {
              throw (
                "Release version mismatch: source=$($entry.Key) " +
                "expected=$expected actual=$($entry.Value)"
              )
            }
          }

          "VERSION=$expected" |
            Out-File $env:GITHUB_ENV -Append -Encoding UTF8
      - name: Initialize package diagnostics
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package-diagnostics | Out-Null
          New-Item -ItemType File -Force package-diagnostics\prior-native-office-build.log | Out-Null
          New-Item -ItemType File -Force package-diagnostics\current-native-office-build.log | Out-Null
      - name: Clean generated resource targets
        shell: pwsh
        run: |
          foreach ($name in @('OfficeJS', 'WPS', 'NativeOffice', 'Obsidian', 'Ecosystem')) {
            $path = Join-Path 'src-tauri\resources' $name
            if (Test-Path -LiteralPath $path) { Remove-Item -LiteralPath $path -Recurse -Force }
          }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Windows Native Office CI dependencies
        uses: ./.github/actions/setup-native-office
        with:
          diagnostics-directory: package-diagnostics
      - name: Configure release VSTO signing
        if: inputs.release_mode
        shell: pwsh
        env:
          VSTO_CERT_BASE64: ${{ secrets.VSTO_CERT_BASE64 }}
          VSTO_CERT_PASSWORD: ${{ secrets.VSTO_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VSTO_CERT_BASE64)) {
            throw "VSTO_CERT_BASE64 is required for release packaging"
          }

          if ([string]::IsNullOrWhiteSpace($env:VSTO_CERT_PASSWORD)) {
            throw "VSTO_CERT_PASSWORD is required for release packaging"
          }

          $pfx = Join-Path $env:RUNNER_TEMP "LaTeXSnipper-Office-Release.pfx"

          try {
            $bytes = [Convert]::FromBase64String($env:VSTO_CERT_BASE64)
            [IO.File]::WriteAllBytes($pfx, $bytes)
          } catch {
            throw "VSTO_CERT_BASE64 is not valid Base64: $($_.Exception.Message)"
          }

          $securePassword = ConvertTo-SecureString `
            $env:VSTO_CERT_PASSWORD `
            -AsPlainText `
            -Force

          $certificate = Get-PfxCertificate `
            -FilePath $pfx `
            -Password $securePassword

          if (-not $certificate.HasPrivateKey) {
            throw "Release VSTO PFX does not contain a private key"
          }

          "VstoManifestKeyFile=$pfx" |
            Out-File $env:GITHUB_ENV -Append -Encoding UTF8

          "VstoManifestKeyPassword=$env:VSTO_CERT_PASSWORD" |
            Out-File $env:GITHUB_ENV -Append -Encoding UTF8

          "VstoManifestThumbprint=$($certificate.Thumbprint)" |
            Out-File $env:GITHUB_ENV -Append -Encoding UTF8
      - run: npm ci
      - run: npm --prefix apps/office-addin ci
      - run: npm --prefix apps/obsidian-plugin ci
      - run: npm --prefix apps/vscode-extension ci
      - run: npm --prefix apps/browser-extension ci

      - name: Build prior-version NativeOffice MSI
        if: inputs.full_upgrade
        shell: pwsh
        run: |
          & .\scripts\resolve-prior-native-office-msi.ps1 `
            -Tag '${{ inputs.prior_tag }}' -Destination prior-version.msi -DiagnosticsDirectory package-diagnostics *>&1 |
            Tee-Object package-diagnostics\prior-native-office-build.log
      - name: Build current NativeOffice MSI and bootstrapper
        shell: pwsh
        run: |
          $version = $env:VERSION
          & powershell -NoProfile -ExecutionPolicy Bypass -File apps\native-office\Installer\build.ps1 `
            -Configuration Release -Version $version *>&1 |
            Tee-Object package-diagnostics\current-native-office-build.log
          if ($LASTEXITCODE -ne 0) { throw "Current Native Office build failed with exit code $LASTEXITCODE" }
      - name: Test exact NativeOffice binaries selected for packaging
        shell: pwsh
        run: |
          $testProject = (
            "apps\native-office\" +
            "LaTeXSnipper.OleFormulaObjectNative.Tests\" +
            "LaTeXSnipper.OleFormulaObjectNative.Tests.vcxproj"
          )

          foreach ($platform in @('Win32', 'x64')) {
            msbuild $testProject `
              /m `
              /t:Build `
              /p:Configuration=Release `
              /p:Platform=$platform `
              /p:WarningLevel=Level4 `
              /p:TreatWarningAsError=true `
              /v:minimal

            if ($LASTEXITCODE -ne 0) {
              throw "NativeVectorTests build failed for $platform"
            }
          }

          $staging = (
            "apps\native-office\Installer\output\staging"
          )

          & (
            "apps\native-office\" +
            "LaTeXSnipper.OleFormulaObjectNative.Tests\" +
            "bin\Win32\Release\NativeVectorTests.exe"
          ) `
            "$staging\OleFormulaObject.x86.dll" `
            "apps\native-office\fixtures\mathjax-svg"

          if ($LASTEXITCODE -ne 0) {
            throw "Win32 packaged OLE vector tests failed"
          }

          & (
            "apps\native-office\" +
            "LaTeXSnipper.OleFormulaObjectNative.Tests\" +
            "bin\x64\Release\NativeVectorTests.exe"
          ) `
            "$staging\OleFormulaObject.x64.dll" `
            "apps\native-office\fixtures\mathjax-svg"

          if ($LASTEXITCODE -ne 0) {
            throw "x64 packaged OLE vector tests failed"
          }

          & scripts\invoke-native-office-activation-gate.ps1 `
            -StagingRoot $staging `
            -ProbeConfiguration Release `
            -DiagnosticsDirectory package-diagnostics
      - name: Set Office.js manifest version
        shell: pwsh
        run: |
          $manifestVersion = "$env:VERSION.0"

          Get-ChildItem `
            apps\office-addin\manifests\manifest.*.desktop.xml |
            ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace `
                '<Version>[^<]+</Version>', `
                "<Version>$manifestVersion</Version>"

              Set-Content `
                -LiteralPath $_.FullName `
                -Value $content `
                -Encoding UTF8
            }
      - name: Build and stage desktop resources
        shell: pwsh
        run: |
          $version = $env:VERSION
          npm run build:office-addin
          npm run build:wps
          $wpsStaging = "apps\wps\dist\latexsnipper-wps_$version"
          Write-Host "WPS staging path: $wpsStaging"
          Write-Host "WPS staging exists: $(Test-Path -LiteralPath $wpsStaging)"
          if (-not (Test-Path -LiteralPath $wpsStaging)) {
            Write-Host "Listing apps\wps\dist contents:"
            Get-ChildItem -Path "apps\wps\dist" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
            throw "WPS build output missing: $wpsStaging"
          }
          npm run build:ecosystem
          npm run stage:ecosystem
          npm run build:vite
          "WPS_STAGING=$wpsStaging" | Out-File $env:GITHUB_ENV -Append -Encoding UTF8
          "NATIVE_OFFICE_STAGING=apps\native-office\Installer\output\staging" | Out-File $env:GITHUB_ENV -Append -Encoding UTF8
          & .\scripts\stage-resources.ps1 `
            -WpsStaging $wpsStaging `
            -OfficeJsStaging src-tauri\resources\OfficeJS `
            -NativeOfficeStaging apps\native-office\Installer\output\staging `
            -WpsSourceName 'current deterministic WPS build' `
            -OfficeJsSourceName 'current deterministic OfficeJS build' `
            -NativeOfficeSourceName 'current NativeOffice installer build' `
            -ObsidianSourceName 'current deterministic ecosystem build'
          Copy-Item src-tauri\resources\provenance.json package-diagnostics\resource-provenance.json -Force
      - name: Build Tauri MSI and NSIS
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE 'src-tauri\target\release\bundle'
          foreach ($name in @('msi', 'nsis')) {
            $path = Join-Path $bundleRoot $name
            if (Test-Path -LiteralPath $path) { Remove-Item -LiteralPath $path -Recurse -Force }
          }
          npx tauri build --config src-tauri/tauri.ci.windows.conf.json --bundles msi,nsis
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Unpack all Windows packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package-extract\native, package-extract\tauri-msi, package-extract\nsis | Out-Null
          $nativeMsi = (Get-ChildItem apps\native-office\Installer\output\*.msi | Select-Object -First 1).FullName
          $tauriMsis = @(Get-ChildItem src-tauri\target\release\bundle\msi\*.msi)
          $nsisBundles = @(Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe)
          if ($tauriMsis.Count -ne 1 -or $nsisBundles.Count -ne 1) {
            throw "Expected exactly one current Tauri MSI and NSIS bundle; MSI=$($tauriMsis.Count) NSIS=$($nsisBundles.Count)"
          }
          $tauriMsi = $tauriMsis[0].FullName
          $nsis = $nsisBundles[0].FullName
          $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/a `"$nativeMsi`" /qn TARGETDIR=`"$pwd\package-extract\native`""
          if ($p.ExitCode -ne 0) { throw "Native MSI administrative extraction failed: $($p.ExitCode)" }
          $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/a `"$tauriMsi`" /qn TARGETDIR=`"$pwd\package-extract\tauri-msi`""
          if ($p.ExitCode -ne 0) { throw "Tauri MSI administrative extraction failed: $($p.ExitCode)" }
          $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) { $sevenZip = "$env:ProgramFiles\7-Zip\7z.exe" }
          if (-not (Test-Path -LiteralPath $sevenZip)) { throw "7-Zip executable not found" }
          & $sevenZip x -y "-opackage-extract\nsis" $nsis | Out-File package-diagnostics\nsis-extract.log
          if ($LASTEXITCODE -ne 0) { throw "NSIS extraction failed: $LASTEXITCODE" }
      - name: Verify final package contents, PE, exports, dependencies, versions, and hashes
        shell: pwsh
        run: |
          & scripts\verify-package-contents.ps1 `
            -StagingRoot apps\native-office\Installer\output\staging `
            -WindowsPackageRoots @('package-extract\native', 'package-extract\tauri-msi', 'package-extract\nsis') `
            -WpsStaging $env:WPS_STAGING `
            -WpsPackageRoots @('package-extract\tauri-msi', 'package-extract\nsis') `
            -ResourceStagingRoot src-tauri\resources `
            -ResourcePackageRoots @('package-extract\tauri-msi', 'package-extract\nsis') `
            -ExpectedVersion $env:VERSION
      - name: Create verified standalone VSTO package
        shell: pwsh
        run: |
          $output = "release-components"
          $staging = "apps\native-office\Installer\output\staging"
          $zip = Join-Path `
            $output `
            "LaTeXSnipper-Office-VSTO_$env:VERSION.zip"

          if (Test-Path $output) {
            Remove-Item $output -Recurse -Force
          }

          New-Item -ItemType Directory -Path $output -Force | Out-Null

          & scripts\verify-vsto-manifests.ps1 `
            -PayloadRoot $staging

          $items = Get-ChildItem -LiteralPath $staging -Force

          Compress-Archive `
            -Path $items.FullName `
            -DestinationPath $zip `
            -CompressionLevel Optimal

          if (-not (Test-Path $zip -PathType Leaf)) {
            throw "Standalone VSTO ZIP was not generated"
          }
      - name: Install, activate, same-version reinstall, cross-version upgrade, and uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $current = (Get-ChildItem apps\native-office\Installer\output\*.msi | Select-Object -First 1).FullName
          $fullUpgrade = '${{ inputs.full_upgrade }}' -eq 'true'
          $windowsInstaller = New-Object -ComObject WindowsInstaller.Installer
          function Get-MsiProductVersion([string]$Path) {
            $database = $windowsInstaller.GetType().InvokeMember('OpenDatabase', 'InvokeMethod', $null, $windowsInstaller, @($Path, 0))
            $view = $database.GetType().InvokeMember('OpenView', 'InvokeMethod', $null, $database, @("SELECT ``Value`` FROM ``Property`` WHERE ``Property``='ProductVersion'"))
            $view.GetType().InvokeMember('Execute', 'InvokeMethod', $null, $view, $null) | Out-Null
            $record = $view.GetType().InvokeMember('Fetch', 'InvokeMethod', $null, $view, $null)
            return $record.GetType().InvokeMember('StringData', 'GetProperty', $null, $record, 1)
          }
          $operations = @()
          if ($fullUpgrade) {
            $prior = (Resolve-Path prior-version.msi).Path
            $priorVersion = Get-MsiProductVersion $prior
            $expectedPrior = '${{ inputs.prior_tag }}'.TrimStart('v')
            if ($priorVersion -ne $expectedPrior) { throw "Prior MSI ProductVersion mismatch: expected=$expectedPrior actual=$priorVersion" }
            "prior=$priorVersion`ncurrent=$(Get-MsiProductVersion $current)" |
              Set-Content package-diagnostics\msi-product-versions.txt -Encoding UTF8
            $operations += @{ Name = 'prior-install'; Path = $prior }
            $operations += @{ Name = 'cross-version-upgrade'; Path = $current }
            $operations += @{ Name = 'same-version-reinstall'; Path = $current }
          } else {
            "current=$(Get-MsiProductVersion $current)" | Set-Content package-diagnostics\msi-product-versions.txt -Encoding UTF8
            $operations += @{ Name = 'current-install'; Path = $current }
          }
          foreach ($operation in $operations) {
            $log = Join-Path package-diagnostics "$($operation.Name).log"
            $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/i `"$($operation.Path)`" /qn /norestart /l*v `"$log`""
            if ($p.ExitCode -notin @(0, 3010)) { throw "MSI $($operation.Name) failed: $($p.ExitCode) file=$($operation.Path)" }
          }
          $installed = Join-Path $env:LOCALAPPDATA 'LaTeXSnipper\NativeOffice'
          & scripts\invoke-native-office-activation-gate.ps1 `
            -StagingRoot $installed `
            -ProbeConfiguration Release `
            -DiagnosticsDirectory package-diagnostics `
            -ExistingRegistration
          $uninstallLog = Join-Path package-diagnostics 'uninstall.log'
          $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/x `"$current`" /qn /norestart /l*v `"$uninstallLog`""
          if ($p.ExitCode -notin @(0, 1605, 3010)) { throw "MSI uninstall failed: $($p.ExitCode)" }
          $savedErrorAction = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          foreach ($view in @('32', '64')) {
            reg.exe query 'HKCU\Software\Classes\CLSID\{B7F5B4AB-5F94-4D87-A29F-9A41D41B3B9F}' "/reg:$view" *> $null
            if ($LASTEXITCODE -eq 0) { throw "CLSID residue remains in registry view $view" }
          }
          $ErrorActionPreference = $savedErrorAction
          if (Test-Path $installed) {
            $remaining = @(Get-ChildItem $installed -Recurse -File -ErrorAction SilentlyContinue)
            if ($remaining.Count -gt 0) { throw "NativeOffice file residue remains: $($remaining.FullName -join ', ')" }
          }
      - name: Remove ephemeral release PFX
        if: always()
        shell: pwsh
        run: |
          if (
            $env:VstoManifestKeyFile -and
            (Test-Path -LiteralPath $env:VstoManifestKeyFile)
          ) {
            Remove-Item `
              -LiteralPath $env:VstoManifestKeyFile `
              -Force `
              -ErrorAction SilentlyContinue
          }
      - name: Upload package diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-diagnostics-windows
          path: package-diagnostics/
          if-no-files-found: warn
          retention-days: 14
      - name: Upload verified Windows packages
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: verified-windows-packages
          path: |
            apps/native-office/Installer/output/*.msi
            apps/native-office/Installer/output/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            release-components/*.zip

  linux-packages:
    if: inputs.run_linux
    uses: ./.github/workflows/package-nonwindows.yml
    with:
      runner: ubuntu-24.04
      bundles: deb,rpm
      artifact_name: verified-Linux-packages
      source_ref: ${{ inputs.source_ref }}
      expected_version: ${{ inputs.expected_version }}
    permissions:
      contents: read

  macos-packages:
    if: inputs.run_macos
    uses: ./.github/workflows/package-nonwindows.yml
    with:
      runner: macos-14
      bundles: dmg
      artifact_name: verified-macOS-packages
      source_ref: ${{ inputs.source_ref }}
      expected_version: ${{ inputs.expected_version }}
    permissions:
      contents: read
