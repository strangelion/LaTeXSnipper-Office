<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaTeXSnipper</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --line: #d7dfec;
      --text: #182235;
      --muted: #667085;
      --accent: #2e7be6;
      --accent-hover: #2165c8;
      --info-bg: #eef4ff;
      --info-line: #b2ccff;
      --info-text: #1849a9;
      --success-bg: #ecfdf3;
      --success-line: #abefc6;
      --success-text: #067647;
      --error-bg: #fff1f0;
      --error-line: #ffccc7;
      --error-text: #cf1322;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--text); background: var(--bg); font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
    button, input, textarea { font: inherit; }
    .taskpane-shell { min-height: 100vh; padding: 14px; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    h1 { margin: 0; font-size: 18px; font-weight: 700; }
    p { margin: 3px 0 0; color: #52637f; font-size: 12px; }
    .status-banner { min-height: 42px; margin-bottom: 12px; padding: 10px 12px; border: 1px solid var(--info-line); border-radius: 6px; color: var(--info-text); background: var(--info-bg); font-size: 13px; line-height: 1.4; }
    .status-banner.success { border-color: var(--success-line); color: var(--success-text); background: var(--success-bg); }
    .status-banner.error { border-color: var(--error-line); color: var(--error-text); background: var(--error-bg); }
    .panel { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 12px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); }
    label { color: #24324a; font-size: 12px; font-weight: 700; }
    .preview-host { min-height: 66px; max-height: 220px; overflow-x: auto; overflow-y: auto; padding: 10px; border: 1px solid #c8d3e2; border-radius: 4px; background: #ffffff; display: flex; align-items: center; justify-content: center; }
    .preview-host img { max-width: 100%; max-height: 200px; }
    .preview-placeholder { color: var(--muted); font-size: 13px; }
    textarea { width: 100%; min-height: 112px; padding: 9px 10px; border: 1px solid #c8d3e2; border-radius: 4px; color: #101828; background: #ffffff; outline: none; resize: vertical; font: 14px/1.45 Consolas, "Cascadia Mono", monospace; }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(46, 123, 230, 0.14); }
    .options-row { display: grid; grid-template-columns: auto auto 1fr; gap: 7px; align-items: center; }
    .options-row label { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; font-size: 12px; font-weight: 500; }
    .options-row input[type="checkbox"] { width: auto; margin: 0; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    button { min-height: 38px; padding: 8px 12px; border: 1px solid #c8d3e2; border-radius: 4px; color: #182235; background: #ffffff; cursor: pointer; }
    button:hover:not(:disabled) { border-color: #9bb8de; background: #f7fbff; }
    button.primary { border-color: var(--accent); color: #ffffff; background: var(--accent); font-weight: 700; }
    button.primary:hover:not(:disabled) { border-color: var(--accent-hover); background: var(--accent-hover); }
    button:disabled { cursor: default; opacity: 0.58; }
    .ghost-button { width: auto; min-width: 84px; }
    .ghost-button.full { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <main class="taskpane-shell">
    <section class="toolbar">
      <div>
        <h1>LaTeXSnipper</h1>
        <p>WPS 插件</p>
      </div>
      <button id="connectButton" type="button" class="ghost-button">连接</button>
    </section>

    <div id="statusBanner" class="status-banner" role="status">
      <span id="statusText">就绪。</span>
    </div>

    <section class="panel">
      <label for="latexSource">LaTeX</label>
      <textarea id="latexSource" spellcheck="false" placeholder="输入 LaTeX 公式，例如: \frac{a}{b}"></textarea>
      <div id="previewSection">
        <label>预览</label>
        <div id="previewHost" class="preview-host">
          <span class="preview-placeholder">输入公式后显示预览</span>
        </div>
      </div>
      <div class="options-row">
        <label><input id="displayMode" type="checkbox"><span>行间公式</span></label>
        <label><input id="autoNumber" type="checkbox"><span>自动编号</span></label>
      </div>
    </section>

    <section class="actions">
      <button id="insertButton" type="button" class="primary">插入公式</button>
      <button id="insertImageButton" type="button">插入图片</button>
      <button id="loadSelectedButton" type="button">加载选中</button>
      <button id="deleteSelectedButton" type="button">删除选中</button>
      <button id="renumberButton" type="button" class="ghost-button full">重新编号</button>
    </section>
  </main>

  <script>
    const BRIDGE_URL = "http://127.0.0.1:19876";

    function wpsFetch(url, options) {
      return fetch(url, options);
    }

    const els = {
      connectButton: document.getElementById("connectButton"),
      statusBanner: document.getElementById("statusBanner"),
      statusText: document.getElementById("statusText"),
      previewHost: document.getElementById("previewHost"),
      latexSource: document.getElementById("latexSource"),
      displayMode: document.getElementById("displayMode"),
      autoNumber: document.getElementById("autoNumber"),
      insertButton: document.getElementById("insertButton"),
      insertImageButton: document.getElementById("insertImageButton"),
      loadSelectedButton: document.getElementById("loadSelectedButton"),
      deleteSelectedButton: document.getElementById("deleteSelectedButton"),
      renumberButton: document.getElementById("renumberButton"),
    };

    let bridgeConnected = false;
    let bridgeToken = "";

    function logWpsFailure(operation, formulaId, error) {
      const hresult = error && (error.number || error.hresult || error.code) || 0;
      console.error(`[WPS] operation=${operation} host=wps formulaId=${formulaId || "<unknown>"} hresult=${hresult}`,
        error && (error.name || "Error"));
    }

    function setStatus(kind, message) {
      els.statusBanner.className = "status-banner " + kind;
      els.statusText.textContent = message;
    }

    function syncToStorage() {
      try {
        window.parent.window.Application.PluginStorage.setItem("current_latex", els.latexSource.value);
        window.parent.window.Application.PluginStorage.setItem("current_display", els.displayMode.checked);
        window.parent.window.Application.PluginStorage.setItem("current_auto_number", els.autoNumber.checked);
      } catch (e) { logWpsFailure("sync-storage", null, e); }
    }

    async function checkBridge() {
      try {
        const response = await wpsFetch(BRIDGE_URL + "/config");
        const data = await response.json();
        bridgeToken = data.result?.token || "";
        bridgeConnected = true;
        try {
          window.parent.window.Application.PluginStorage.setItem("bridge_token", bridgeToken);
        } catch (e) { logWpsFailure("store-bridge-token", null, e); }
        setStatus("success", "已连接到 LaTeXSnipper Bridge");
        els.connectButton.textContent = "已连接";
        els.connectButton.disabled = true;
        syncToStorage();
        updatePreview();
      } catch (e) {
        bridgeConnected = false;
        bridgeToken = "";
        setStatus("error", "Bridge 未连接，请启动 LaTeXSnipper 桌面应用");
        els.connectButton.textContent = "连接";
        els.connectButton.disabled = false;
      }
    }

    async function updatePreview() {
      const latex = els.latexSource.value.trim();
      if (!latex) {
        els.previewHost.innerHTML = '<span class="preview-placeholder">输入公式后显示预览</span>';
        return;
      }
      if (!bridgeConnected) {
        els.previewHost.innerHTML = '<span class="preview-placeholder">需要连接 Bridge 才能预览</span>';
        return;
      }
      try {
        const response = await wpsFetch(BRIDGE_URL + "/convert/latex", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + bridgeToken },
          body: JSON.stringify({ latex: latex, display: els.displayMode.checked, targets: ["png"] })
        });
        const result = await response.json();
        if (result.ok && result.result.png_base64) {
          els.previewHost.innerHTML = '<img src="data:image/png;base64,' + result.result.png_base64 + '" alt="公式预览">';
        } else {
          els.previewHost.innerHTML = '<span class="preview-placeholder">预览失败</span>';
        }
      } catch (e) {
        els.previewHost.innerHTML = '<span class="preview-placeholder">预览失败: ' + e.message + '</span>';
      }
    }

    // ─── All commands route through parent.CommandLayer.dispatch ────
    var CL = function() {
      try { return window.parent.window.CommandLayer; } catch(e) { logWpsFailure("resolve-command-layer", null, e); return null; }
    }();

    function callWPS(cmd) {
      if (!CL) { setStatus("error", "CommandLayer not available"); return Promise.resolve({ ok: false, error: "No CommandLayer" }); }
      return CL.dispatch("wps", cmd).then(function(r) { return r; });
    }

    function insertFormula() {
      var latex = els.latexSource.value.trim();
      if (!latex) { alert("请先输入 LaTeX 公式"); return; }

      callWPS({ type: "InsertFormula", payload: { latex: latex, display: els.displayMode.checked ? "block" : "inline" } }).then(function(result) {
        if (result.ok) {
          if (els.autoNumber.checked) {
            // Numbered insert needs a second call after insertion
            callWPS({ type: "InsertFormula", payload: { latex: "\t(" + Date.now() % 1000 + ")", display: "inline" } });
          }
          setStatus("success", "公式插入成功" + (els.autoNumber.checked ? "（含编号）" : ""));
        } else {
          setStatus("error", "插入失败: " + (result.error || "未知错误"));
        }
      });
    }

    async function insertFormulaAsImage() {
      var latex = els.latexSource.value.trim();
      if (!latex) { alert("请先输入 LaTeX 公式"); return; }
      if (!bridgeConnected) { alert("请先连接 Bridge"); return; }

      try {
        var response = await wpsFetch(BRIDGE_URL + "/convert/latex", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + bridgeToken },
          body: JSON.stringify({ latex: latex, display: els.displayMode.checked, targets: ["png"] })
        });
        var result = await response.json();
        if (!result.ok || !result.result.png_base64) {
          alert("公式转换失败");
          return;
        }

        var saveRes = await wpsFetch(BRIDGE_URL + "/save-temp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: "latex_" + Date.now() + ".png", base64: result.result.png_base64 })
        });
        var saveData = await saveRes.json();
        if (!saveData.ok) {
          alert("保存临时文件失败: " + saveData.error);
          return;
        }

        var filePath = saveData.path;
        // Use WPS API for image insertion (no standard command for this yet)
        try {
          var app = window.parent.window.Application;
          var isPPT = false;
          try { isPPT = !!app.ActivePresentation && !app.ActiveDocument; } catch(e) { logWpsFailure("detect-host", null, e); }
          if (isPPT) {
            var slide = app.ActiveWindow.View.Slide;
            if (!slide) { alert("请先选择一张幻灯片"); return; }
            slide.Shapes.AddPicture(filePath, false, true, 100, 100);
          } else {
            var sel = app.Selection;
            sel.Range.Collapse(0);
            sel.InlineShapes.AddPicture(filePath, false, true);
          }
        } catch (e) {
          alert("图片插入失败: " + e.message);
          return;
        }

        try { await wpsFetch(BRIDGE_URL + "/delete-temp?path=" + encodeURIComponent(filePath), { method: "DELETE" }); } catch(e) { logWpsFailure("delete-temp", null, e); }
        setStatus("success", "图片插入成功");
      } catch (e) {
        setStatus("error", "插入失败: " + e.message);
      }
    }

    function loadSelectedFormula() {
      callWPS({ type: "GetSelection" }).then(function(result) {
        if (result.ok && result.data) {
          els.latexSource.value = result.data;
          syncToStorage();
          updatePreview();
          setStatus("success", "已加载选中公式");
        } else {
          setStatus("error", "请先选中一个公式");
        }
      });
    }

    function deleteSelectedFormula() {
      callWPS({ type: "ReplaceSelection", payload: { content: "" } }).then(function(result) {
        if (result.ok) {
          setStatus("success", "已删除选中公式");
        } else {
          setStatus("error", "删除失败: " + result.error);
        }
      });
    }

    function renumberFormulas() {
      callWPS({ type: "DetectTable" }).then(function(result) {
        // Renumber uses internal doc operation — route via InsertFormula with special flag
        // For full renumber, taskpane delegates to ribbon's renumberAll via parent
        try {
          var fn = window.parent.window.renumberAll;
          if (typeof fn === "function") { fn(); return; }
        } catch(e) { logWpsFailure("invoke-renumber", null, e); }
        setStatus("error", "重新编号功能在任务窗格中不可用，请在 ribbon 工具栏使用");
      });
    }

    let previewTimer = null;
    function debouncedPreview() {
      if (previewTimer) clearTimeout(previewTimer);
      previewTimer = setTimeout(() => { updatePreview(); syncToStorage(); }, 500);
    }

    els.latexSource.addEventListener("input", debouncedPreview);
    els.displayMode.addEventListener("change", () => { updatePreview(); syncToStorage(); });
    els.autoNumber.addEventListener("change", syncToStorage);
    els.connectButton.addEventListener("click", checkBridge);
    els.insertButton.addEventListener("click", insertFormula);
    els.insertImageButton.addEventListener("click", insertFormulaAsImage);
    els.loadSelectedButton.addEventListener("click", loadSelectedFormula);
    els.deleteSelectedButton.addEventListener("click", deleteSelectedFormula);
    els.renumberButton.addEventListener("click", renumberFormulas);

    checkBridge();
    updatePreview();
  </script>
</body>
</html>
