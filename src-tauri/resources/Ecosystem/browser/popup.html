<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaTeXSnipper</title>
  <style>
    body { width: 280px; margin: 0; padding: 12px; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    .status { color: #666; margin-bottom: 8px; }
    .status.connected { color: #2e7d32; }
    .status.disconnected { color: #c62828; }
    button { display: block; width: 100%; padding: 6px; margin-bottom: 4px; cursor: pointer; }
    .formulas { margin-top: 8px; }
    .formula-item { padding: 4px 0; border-bottom: 1px solid #eee; word-break: break-all; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>LaTeXSnipper</h1>
  <div id="status" class="status">Checking connection...</div>
  <button id="scanPage">Scan Page Formulas</button>
  <button id="sendSelection">Send Selection to Desktop</button>
  <div id="formulas" class="formulas"></div>
  <script src="popup.js"></script>
</body>
</html>
