[package]
name = "latexsnipper-office"
version = "0.2.0"
edition = "2021"
description = "Independent LaTeX formula editor"
authors = ["LaTeXSnipper"]
license = "AGPL-3.0-only"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-os = "2"
dirs-next = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
axum = "0.7"
tower-http = { version = "0.5", features = ["cors"] }
quick-xml = "0.37"
regex = "1"
base64 = "0.22"
log = "0.4"
env_logger = "0.11"

# LaTeXSnipper Core (via symlink)
latexsnipper-pipeline = { path = "latexsnipper-core/crates/pipeline" }
latexsnipper-ast = { path = "latexsnipper-core/crates/ast" }
latexsnipper-conversion = { path = "latexsnipper-core/crates/conversion" }
latexsnipper-foundation = { path = "latexsnipper-core/crates/foundation" }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
