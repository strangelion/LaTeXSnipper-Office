<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaTeXSnipper</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f7f9;
      color: #202124;
      font-size: 14px;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
      gap: 10px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 24px;
    }
    .title {
      font-weight: 650;
    }
    #hostLabel {
      color: #5f6368;
      font-size: 12px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    button, select {
      min-height: 32px;
      border: 1px solid #c8ccd2;
      background: #fff;
      border-radius: 4px;
      color: #202124;
      font: inherit;
    }
    button {
      cursor: pointer;
    }
    button:hover {
      background: #eef3f8;
    }
    button.primary {
      background: #0f6cbd;
      border-color: #0f6cbd;
      color: #fff;
    }
    button.primary:hover {
      background: #115ea3;
    }
    textarea {
      flex: 1;
      width: 100%;
      min-height: 180px;
      padding: 10px;
      border: 1px solid #c8ccd2;
      border-radius: 4px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      resize: none;
      background: #fff;
    }
    .status {
      min-height: 24px;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #0f6cbd;
    }
    .status.error {
      color: #b42318;
      background: #fef3f2;
    }
    .status.success {
      color: #027a48;
      background: #ecfdf3;
    }
  </style>
  <script type="module" crossorigin src="/office/assets/taskpane-D-qz8LAS.js"></script>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="title">LaTeXSnipper</div>
      <div id="hostLabel">Office</div>
    </div>
    <div class="toolbar">
      <button id="loadBtn" title="Load the current selection">Load</button>
      <button id="insertBtn" class="primary" title="Insert into the current selection">Insert</button>
      <button id="deleteBtn" title="Delete the current selection">Delete</button>
    </div>
    <select id="modeSelect" title="Formula mode">
      <option value="inline">Inline</option>
      <option value="display" selected>Display</option>
      <option value="numbered">Numbered</option>
    </select>
    <textarea id="editor" spellcheck="false" placeholder="Enter LaTeX, for example: \frac{a}{b} + \sum_{i=0}^{n} x_i"></textarea>
    <div id="status" class="status info">Starting...</div>
  </div>
</body>
</html>
