<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaTeXSnipper Office</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" id="sidebarClose">×</button>
      <div class="sidebar-section">
        <label class="sidebar-label" data-i18n="settings.officeIntegration"></label>
        <select id="officeHostSelect" class="sidebar-select">
          <option value="">--</option>
        </select>
      </div>
      <div class="sidebar-section">
        <label class="sidebar-label" data-i18n="office.insert"></label>
        <select id="formulaInsertMode" class="sidebar-select">
          <option value="auto" data-i18n="officeIntegration.mode.auto"></option>
          <option value="native" data-i18n="officeIntegration.mode.native"></option>
          <option value="image" data-i18n="officeIntegration.mode.image"></option>
          <option value="ole" data-i18n="officeIntegration.mode.ole"></option>
        </select>
      </div>
      <div class="sidebar-section">
        <div id="oleStatus" class="sidebar-status"></div>
      </div>
      <div class="sidebar-section sidebar-formula">
        <textarea id="latexInput" placeholder="e^{i\pi} + 1 = 0" rows="3"></textarea>
        <div class="sidebar-formula-actions">
          <button id="insertInline" class="sidebar-btn" data-i18n="office.insert"></button>
          <button id="insertBlock" class="sidebar-btn" data-i18n="office.insert"></button>
        </div>
      </div>
      <div class="sidebar-section">
        <button id="openEditor" class="sidebar-btn sidebar-btn-secondary" data-i18n="office.openEditor"></button>
      </div>
      <div class="sidebar-section">
        <button id="repairOle" class="sidebar-btn sidebar-btn-secondary" data-i18n="officeIntegration.repairOle"></button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="connectionStatus" class="connection-status" data-i18n="common.unknown"></div>
      <div id="formulaPreview" class="formula-preview"></div>
      <div class="office-hosts">
        <h3 data-i18n="settings.officeIntegration"></h3>
        <div id="officeHostsList" class="office-hosts-list"></div>
      </div>
      <div class="history-section">
        <h3 data-i18n="office.read"></h3>
        <div id="formulaHistory" class="formula-history"></div>
      </div>
    </main>

    <!-- Ecosystem Platform List -->
    <div id="ecosystemPlatforms" class="ecosystem-platforms" hidden>
      <h3 data-i18n="settings.officeIntegration"></h3>
      <div id="ecosystemPlatformsList" class="ecosystem-platforms-list"></div>
    </div>

    <!-- Browser Imports -->
    <button id="browserImportsButton" class="browser-imports-button" hidden>
      <span data-i18n="browserImports.badge"></span> <span id="browserImportsBadge">0</span>
    </button>
    <div id="browserImportsModal" class="browser-imports-modal" hidden>
      <section class="browser-imports-dialog" role="dialog" aria-modal="true" aria-labelledby="browserImportsTitle">
        <header>
          <h2 id="browserImportsTitle" data-i18n="browserImports.title"></h2>
          <button id="browserImportsClose" type="button" data-i18n="common.close"></button>
        </header>
        <div class="browser-imports-layout">
          <aside id="browserImportsList"></aside>
          <main id="browserImportPreview">
            <p data-i18n="browserImports.selectToPreview"></p>
          </main>
        </div>
      </section>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
