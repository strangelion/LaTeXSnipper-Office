<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaTeXSnipper</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 6px 12px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar button:hover { background: #e0e0e0; }
    .toolbar button.primary {
      background: #0078d4;
      color: #fff;
      border-color: #0078d4;
    }
    .toolbar button.primary:hover { background: #106ebe; }
    textarea {
      flex: 1;
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      resize: none;
    }
    .status {
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      min-height: 20px;
    }
    .status.info { color: #0078d4; }
    .status.error { color: #d32f2f; background: #ffebee; }
    .status.success { color: #2e7d32; background: #e8f5e9; }
    select {
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="loadBtn" title="从 Word 加载选中公式">加载公式</button>
      <button id="insertBtn" class="primary" title="插入公式到 Word">插入</button>
      <button id="deleteBtn" title="删除当前公式">删除</button>
      <select id="modeSelect">
        <option value="inline">行内</option>
        <option value="display" selected>显示</option>
        <option value="numbered">编号</option>
      </select>
    </div>
    <textarea id="editor" placeholder="在此输入 LaTeX 公式...&#10;例如: \frac{a}{b} + \sum_{i=0}^{n} x_i"></textarea>
    <div id="status" class="status info">就绪</div>
  </div>
  <script type="module" src="./taskpane.ts"></script>
</body>
</html>
